<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>leshy</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: url('leshy.jpg') repeat;
      background-size: 300px;
      image-rendering: pixelated;
      color: #f0ece4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 18vh;
      gap: 2.5rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 300;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 0, 0, 0.6);
    }

    .sparkle {
      filter: saturate(0.3) brightness(1.4) sepia(0.3);
      display: inline-block;
    }

    /* ── shared link styles ───────────────────────────── */

    .column a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      border: 1px solid rgba(240, 236, 228, 0.2);
      border-radius: 16px;
      color: #f0ece4;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .column a:hover {
      border-color: rgba(240, 236, 228, 0.4);
      background: rgba(0, 0, 0, 0.7);
    }

    .column a svg {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* ── brand hover colors ───────────────────────────── */

    .column a.instagram:hover { color: #E1306C; }
    .column a.tiktok:hover    { color: #ff0050; }
    .column a.x:hover         { color: #1d9bf0; }
    .column a.youtube:hover   { color: #ff0000; }
    .column a.bandcamp:hover  { color: #1da0c3; }
    .column a.spotify:hover   { color: #1db954; }

    /* ── grid layout ──────────────────────────────────── */

    [data-layout="grid"] .link-container {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    [data-layout="grid"] .column {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 160px;
    }

    [data-layout="grid"] .column h2 {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
      padding-bottom: 0.25rem;
      border-bottom: 1px solid rgba(240, 236, 228, 0.15);
    }

    /* ── list layout ──────────────────────────────────── */

    [data-layout="list"] .link-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    [data-layout="list"] .column {
      display: contents; /* flattens columns into the parent flow */
    }

    [data-layout="list"] .column h2 {
      display: none;
    }

    [data-layout="list"] .column a {
      width: 300px;
    }
  </style>
</head>
<body>

  <script>
    // Change to 'list' to revert to a single stacked column layout
    const LAYOUT = 'grid';
    document.documentElement.dataset.layout = LAYOUT;
  </script>

      <a class="tiktok" href="https://tiktok.com/@madebyleshy" target="_blank" rel="noopener noreferrer">

</body>
